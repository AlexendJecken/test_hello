databases:
  - name: test_hello_db
    plan: free

services:
  - type: web
    name: fastapi-hello-service
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DATABASE_URL
        fromDatabase:
          name: test_hello_db
          property: connectionString
